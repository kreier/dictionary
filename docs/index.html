
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary Web Interface</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding-top: 220px; /* Initial space for fixed header */
            background-color: #f4f4f4;
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .controls {
            width: 100%;
            max-width: 600px;
        }
        #lang-select, .search-box {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-size: 16px;
            height: 40px;
        }
        #key-select {
            flex-grow: 1;
            padding: 8px;
            box-sizing: border-box;
            font-size: 16px;
            height: 40px;
        }
        .category-buttons {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            gap: 5px;
            margin-bottom: 10px;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE and Edge */
        }
        .category-buttons::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }
        .cat-btn {
            flex: 1;
            min-width: 60px;
            padding: 8px 4px;
            font-size: 12px;
            text-align: center;
            border: 1px solid #ccc;
            background: #eee;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .cat-btn.active {
            background: #007bff;
            color: white;
            border-color: #0056b3;
        }
        .cat-count {
            font-size: 10px;
        }
        .nav-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            gap: 10px;
            margin-bottom: 5px;
        }
        .nav-line button {
            padding: 0 15px;
            font-size: 16px;
            cursor: pointer;
            height: 40px;
            background: #eee;
            border: 1px solid #ccc;
        }
        .metadata {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-bottom: 5px;
            min-height: 1.2em;
        }
        .content {
            max-width: 600px;
            margin: 0 auto;
            padding: 10px;
        }
        .box {
            background: white;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .box-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .box-content {
            font-size: 16px;
            white-space: pre-wrap;
        }
        .edit-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        #edit-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <header>
        <div class="controls">
            <select id="lang-select">
                <option value="en">English</option>
<option value="ar">Arabic (العربية) </option>
<option value="hy">Armenian (Հայերեն)</option>
<option value="be">Belarusian (беларуская)</option>
<option value="yue">Chinese Cantonese (Simplified) [中文简体（广东话)] </option>
<option value="ceb">Cebuano (Bisayâ)</option>
<option value="zh">Chinese Mandarin (Simplified) [中文简体（普通话)] </option>
<option value="nl">Dutch (Nederlands)</option>
<option value="et">Estonian (eesti keel)</option>
<option value="fj">Fijian (Vosa Vaka-Viti)</option>
<option value="tl">Tagalog (Filipino) </option>
<option value="fi">Finnish (Suomi) </option>
<option value="fr">French (Français) </option>
<option value="de">German (Deutsch) </option>
<option value="el">Greek (Ελληνικά)</option>
<option value="he">Hebrew (עִבְרִית)</option>
<option value="hi">Hindi (हिन्दी)</option>
<option value="hu">Hungarian (Magyar)</option>
<option value="ig">Igbo (Ásụ̀sụ́ Ìgbò) </option>
<option value="ilo">Iloko (Illocano) </option>
<option value="id">Indonesian (Indonesia)</option>
<option value="it">Italian (Italiano)</option>
<option value="ja">Japanese (日本語) </option>
<option value="kne">Kankana-ey </option>
<option value="km">Khmer (ខ្មែរ) </option>
<option value="kman">Khmer (ខ្មែរ) with arabic numerals</option>
<option value="kg">Kikongo</option>
<option value="ko">Korean (한국인) </option>
<option value="ms">Malay (Bahasa Melayu)</option>
<option value="mn">Mongolian (монгол)</option>
<option value="no">Norwegian (Norsk) </option>
<option value="fa">Persian or Farsi (فارسی)</option>
<option value="pt">Portugese (Português)</option>
<option value="pa">Punjabi (ਪੰਜਾਬੀ)</option>
<option value="ru">Russian (Русский) </option>
<option value="si">Sinhala (සිංහල) </option>
<option value="es">Spanish (Español) </option>
<option value="sw">Swahili (Kiswahili)</option>
<option value="th">Thai (ภาษาไทย) </option>
<option value="uk">Ukrainian (українська)</option>
<option value="ur">Urdu (اُردُو)</option>
<option value="vi">Vietnamese (Tiếng Việt)</option>
            </select>
            <div class="category-buttons" id="category-buttons">
                <button class="cat-btn" data-cat="text"><span>TEXT</span><span class="cat-count" id="count-text">0/0</span></button>
                <button class="cat-btn" data-cat="bible"><span>BIBLE</span><span class="cat-count" id="count-bible">0/0</span></button>
                <button class="cat-btn" data-cat="A6"><span>A6</span><span class="cat-count" id="count-A6">0/0</span></button>
                <button class="cat-btn" data-cat="B9"><span>B9</span><span class="cat-count" id="count-B9">0/0</span></button>
                <button class="cat-btn" data-cat="wiki"><span>WIKI</span><span class="cat-count" id="count-wiki">0/0</span></button>
                <button class="cat-btn" data-cat="other"><span>OTHER</span><span class="cat-count" id="count-other">0/0</span></button>
            </div>
            <input type="text" id="search-input" class="search-box" placeholder="Search key or english...">
            <div class="nav-line">
                <button id="prev-btn">&lt;</button>
                <select id="key-select"></select>
                <button id="next-btn">&gt;</button>
            </div>
            <div class="metadata" id="metadata">
                <span id="checked-emoji"></span>
                <span id="checked-info"></span>
            </div>
        </div>
    </header>

    <div class="content">
        <div class="box"><div class="box-label">Key</div><div class="box-content" id="box-key"></div></div>
        <div class="box"><div class="box-label">Text</div><div class="box-content" id="box-text"></div></div>
        <div class="box"><div class="box-label">English</div><div class="box-content" id="box-english"></div></div>
        <div class="box"><div class="box-label">Notes</div><div class="box-content" id="box-notes"></div></div>
        <div class="box"><div class="box-label">Google</div><div class="box-content" id="box-google"></div></div>
        <div class="box"><div class="box-label">ChatGPT</div><div class="box-content" id="box-chatgpt"></div></div>
        <div class="box"><div class="box-label">Gemini</div><div class="box-content" id="box-gemini"></div></div>
        <div class="box"><div class="box-label">Claude</div><div class="box-content" id="box-claude"></div></div>
        <div class="box"><div class="box-label">Bing</div><div class="box-content" id="box-bing"></div></div>

        <button class="edit-btn" id="edit-btn">EDIT</button>
    </div>

    <div id="edit-modal">
        <div class="modal-content">
            <h3>Edit Entry</h3>
            <label>Name (Editor):</label>
            <input type="text" id="edit-name" placeholder="Your Name">
            <label>Text:</label>
            <textarea id="edit-text" rows="3"></textarea>
            <label>Notes:</label>
            <textarea id="edit-notes" rows="2"></textarea>
            <label><input type="checkbox" id="edit-checked"> Checked</label>
            <div style="display:flex; justify-content: space-between; margin-top:10px;">
                <button onclick="closeModal()">Cancel</button>
                <button onclick="submitEdit()" style="background:#28a745; color:white; border:none; padding:5px 15px;">Submit</button>
            </div>
        </div>
    </div>

    <script>
        let currentLang = '';
        let entries = [];
        let filteredEntries = [];
        let currentIndex = 0;
        let currentCat = 'text';

        const langSelect = document.getElementById('lang-select');
        const catButtons = document.querySelectorAll('.cat-btn');
        const searchInput = document.getElementById('search-input');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        async function loadLang(lang) {
            currentLang = lang;
            const res = await fetch(`data/${lang}.json`);
            entries = await res.json();
            updateCounts();
            filterAndShow();
        }

        function updateCounts() {
            const cats = ['text', 'bible', 'A6', 'B9', 'wiki', 'other'];
            cats.forEach(cat => {
                const catEntries = entries.filter(e => e.category === cat);
                const total = catEntries.length;
                const checked = catEntries.filter(e => e.checked === 'True').length;
                document.getElementById(`count-${cat}`).innerText = `${checked}/${total}`;
            });
        }

        function filterAndShow() {
            const searchTerm = searchInput.value.toLowerCase();
            filteredEntries = entries.filter(e => {
                const matchesCat = e.category === currentCat;
                const matchesSearch = e.key.toLowerCase().includes(searchTerm) || e.english.toLowerCase().includes(searchTerm);
                return matchesCat && matchesSearch;
            });

            const keySelect = document.getElementById('key-select');
            keySelect.innerHTML = '';
            filteredEntries.forEach((e, index) => {
                const opt = document.createElement('option');
                opt.value = index;
                opt.text = e.key;
                keySelect.add(opt);
            });

            currentIndex = 0;
            showEntry();
        }

        function showEntry() {
            const entry = filteredEntries[currentIndex];
            if (!entry) {
                clearDisplay();
                return;
            }
            document.getElementById('key-select').value = currentIndex;
            document.getElementById('box-key').innerText = entry.key;
            document.getElementById('box-text').innerText = entry.text;
            document.getElementById('box-english').innerText = entry.english;
            document.getElementById('box-notes').innerText = entry.notes;
            document.getElementById('box-google').innerText = entry.google || '';
            document.getElementById('box-chatgpt').innerText = entry.chatgpt || '';
            document.getElementById('box-gemini').innerText = entry.gemini || '';
            document.getElementById('box-claude').innerText = entry.claude || '';
            document.getElementById('box-bing').innerText = entry.bing || '';

            document.getElementById('checked-emoji').innerText = entry.checked === 'True' ? '✅' : '⬜';
            document.getElementById('checked-info').innerText = entry.checked === 'True' ?
                ` by ${entry.checked_by} on ${entry.date}` : '';
        }

        function clearDisplay() {
            ['key', 'text', 'english', 'notes', 'google', 'chatgpt', 'gemini', 'claude', 'bing'].forEach(id => {
                document.getElementById(`box-${id}`).innerText = '';
            });
            document.getElementById('checked-emoji').innerText = '';
            document.getElementById('checked-info').innerText = '';
        }

        langSelect.addEventListener('change', (e) => loadLang(e.target.value));

        catButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                catButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCat = btn.dataset.cat;
                filterAndShow();
            });
        });

        searchInput.addEventListener('input', filterAndShow);

        document.getElementById('key-select').addEventListener('change', (e) => {
            currentIndex = parseInt(e.target.value);
            showEntry();
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                showEntry();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < filteredEntries.length - 1) {
                currentIndex++;
                showEntry();
            }
        });

        function adjustPadding() {
            const headerHeight = document.querySelector('header').offsetHeight;
            document.body.style.paddingTop = (headerHeight + 10) + 'px';
        }

        window.addEventListener('resize', adjustPadding);
        const observer = new ResizeObserver(adjustPadding);
        observer.observe(document.querySelector('header'));

        // Initial setup
        document.querySelector('.cat-btn[data-cat="text"]').classList.add('active');
        loadLang(langSelect.value);
        adjustPadding();

        // Edit Modal Logic
        const modal = document.getElementById('edit-modal');
        document.getElementById('edit-btn').addEventListener('click', () => {
            const entry = filteredEntries[currentIndex];
            if (!entry) return;
            document.getElementById('edit-text').value = entry.text;
            document.getElementById('edit-notes').value = entry.notes;
            document.getElementById('edit-checked').checked = entry.checked === 'True';
            modal.style.display = 'flex';
        });

        function closeModal() {
            modal.style.display = 'none';
        }

        function submitEdit() {
            const entry = filteredEntries[currentIndex];
            const name = document.getElementById('edit-name').value;
            if (!name) {
                alert('Please enter your name');
                return;
            }
            const data = {
                lang: currentLang,
                key: entry.key,
                text: document.getElementById('edit-text').value,
                notes: document.getElementById('edit-notes').value,
                checked: document.getElementById('edit-checked').checked,
                editor: name,
                date: new Date().toISOString().split('T')[0]
            };

            // Placeholder for Cloudflare Worker submission
            console.log('Submitting edit:', data);

            fetch('https://your-worker.your-subdomain.workers.dev/submit', {
                method: 'POST',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/json' }
            }).then(res => {
                alert('Submission sent (to placeholder URL)');
                closeModal();
            }).catch(err => {
                console.error(err);
                alert('Submission failed (Expected since URL is placeholder). Check console for data.');
                closeModal();
            });
        }
    </script>
</body>
</html>
